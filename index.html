<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة العقارات التفاعلية الفخمة</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        
        /* شريط علوي مودرن */
        #top-bar { background: #0f172a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.3s ease; }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-admin-active { background: #ef4444 !important; }

        #main-container { display: flex; flex: 1; height: calc(100vh - 60px); width: 100%; position: relative; }
        #map { flex: 1; height: 100%; z-index: 1; }
        
        /* ستايل النوافذ المنبثقة الفخمة (Modals) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content { background: white; width: 90%; max-width: 700px; max-height: 85vh; border-radius: 20px; padding: 30px; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); transform: scale(0.9) translateY(20px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        
        .modal-close { position: absolute; top: 20px; left: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .modal-close:hover { color: #1e293b; }

        /* ستايل الأنيميشن الخاص بالانتقال بين الأدوار والمساحات */
        .animated-section { transition: all 0.3s ease; opacity: 1; transform: translateX(0); }
        .animated-section.fade-out { opacity: 0; transform: translateX(50px); display: none; }
        .animated-section.fade-in { animation: slideIn 0.4s forwards; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* أزرار الأدوار الشيك */
        .floor-btn { background: #f1f5f9; color: #1e293b; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 16px; font-weight: bold; transition: all 0.2s; margin-bottom: 10px; display: block; width: 100%; }
        .floor-btn:hover { background: #3b82f6; color: white; border-color: #3b82f6; transform: scale(1.02); }

        /* كروت المساحات */
        .size-card { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .size-card:hover { border-color: #10b981; background: #f0fdf4; transform: scale(1.01); }

        /* تاجات الديزاين */
        .tag { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: bold; margin-left: 6px; }
        .price-badge { background: #dcfce7; color: #15803d; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 15px; }
        .payment-badge { background: #ffedd5; color: #c2410c; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 8px; display: inline-block; }

        /* ألبوم الصور */
        .gallery { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: thin; }
        .gallery img { width: 140px; height: 100px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid #e2e8f0; transition: transform 0.2s; }
        .gallery img:hover { transform: scale(1.05); border-color: #3b82f6; }
        .main-view-img { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        /* فورمة الإدخال الجانبية (للأدمن فقط) */
        #admin-sidebar { width: 400px; background: white; box-shadow: -4px 0 15px rgba(0,0,0,0.1); padding: 25px; overflow-y: auto; z-index: 5; display: none; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        .nested-box { border: 2px dashed #3b82f6; padding: 15px; margin-top: 15px; background: #f8fafc; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <h2>منظومة الخرائط العقارية التفاعلية 🏢</h2>
        <button id="admin-toggle-btn" class="btn" onclick="toggleAdminMode()">🔧 وضع إضافة العماير</button>
    </div>

    <div id="main-container">
        <div id="map"></div>

        <div id="admin-sidebar">
            <span style="float:left; cursor:pointer;" onclick="closeAdminSidebar()">✕</span>
            <h3 style="margin-bottom:15px;">➕ إضافة عمارة جديدة</h3>
            <div class="form-group"><label>اسم العمارة:</label><input type="text" id="form-b-name" placeholder="مثال: عمارة 123 ج"></div>
            <div class="form-group"><label>الوصف:</label><textarea id="form-b-desc" rows="2" placeholder="مثال: ثالث نمرة من البوابة"></textarea></div>
            <div class="form-group">
                <label>📸 صور واجهة العمارة:</label>
                <input type="file" id="form-b-images" multiple accept="image/*" onchange="handleBuildingImages(this)">
            </div>
            <div id="form-floors-container"></div>
            <button class="btn" style="background:#10b981; margin-top:10px; width:100%" onclick="addFloorForm()">➕ إضافة دور جديد</button>
            <button class="btn btn-success" style="width:100%; margin-top:20px; padding:12px;" onclick="saveNewBuilding()">💾 حفظ العمارة بالكامل</button>
        </div>
    </div>

    <div id="building-modal" class="modal-overlay" onclick="closeModal(this, event)">
        <div class="modal-content">
            <span class="modal-close" onclick="closeBuildingModal()">✕</span>
            <div id="modal-building-img-container"></div>
            <h2 id="modal-b-name" style="font-size: 28px; margin-bottom: 5px;">اسم العمارة</h2>
            <p id="modal-b-loc" style="color: #64748b; margin-bottom: 15px; font-size: 15px;"></p>
            <div id="modal-b-tags" style="margin-bottom: 20px;"></div>
            
            <div id="floors-section" class="animated-section">
                <h3 style="margin-bottom: 15px; font-size: 18px; color: #475569;">⚙️ اختر الدور لمعاينة الشقق المتاحة:</h3>
                <div id="modal-floors-list"></div>
            </div>

            <div id="sizes-section" class="animated-section fade-out">
                <button class="btn" style="background:#64748b; margin-bottom:15px; padding:6px 12px;" onclick="goBackToFloors()">⬅️ العودة للأدوار</button>
                <h3 id="selected-floor-title" style="margin-bottom: 15px; font-size: 18px; color: #475569;">المساحات المتاحة:</h3>
                <div id="modal-sizes-list"></div>
            </div>
        </div>
    </div>

    <div id="apartment-modal" class="modal-overlay" onclick="closeModal(this, event)">
        <div class="modal-content" style="max-width: 550px; border-radius: 16px; border-top: 6px solid #10b981;">
            <span class="modal-close" onclick="closeApartmentModal()">✕</span>
            <h2 id="apt-modal-title" style="color:#0f172a;">تفاصيل الشقة</h2>
            <hr style="margin: 15px 0; border-top: 1px solid #e2e8f0;">
            
            <div id="apt-modal-gallery" class="gallery"></div>
            
            <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 15px;">
                <p style="margin-bottom: 8px; font-size: 16px;">👁️ <strong>الإطلالة الكلية:</strong> <span id="apt-modal-view"></span></p>
                <p style="margin-bottom: 8px; font-size: 16px;">🛏️ <strong>التقسيم الداخلي للغرف:</strong> <span id="apt-modal-rooms"></span></p>
                <div style="margin-top: 15px;">
                    <span id="apt-modal-price" class="price-badge"></span>
                </div>
                <span id="apt-modal-payment" class="payment-badge"></span>
            </div>
            
            <button class="btn btn-success" style="width: 100%; padding: 12px; font-size: 16px;" onclick="closeApartmentModal()">👍 مهتم، العودة للخريطة</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([29.9730, 31.1150], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let adminMode = false;
        let tempMarker = null;
        let currentTempCoords = null;
        let uploadedBuildingImages = [];
        let uploadedAptImagesMap = {};
        let currentSelectedBuilding = null;

        // الداتا الحقيقية مرتبة ومنظمة
        let allBuildings = [
            {
                id: 1,
                name: "عمارة 123 ج",
                coords: [29.9740, 31.1160],
                locationDesc: "ثالث نمرة من البوابة الأولى - عمارة تجاري سكني إداري متميزة",
                types: ["إداري", "سكني", "تجاري"],
                images: [],
                apartments: [
                    { floor: "الدور الثاني", size: "125 متر", view: "خلفي على لاند سكيب", rooms: "3 غرف + ريسبشن كبير + حمام ومطبخ", price: "2,000,000 ج.م", payment: "مقدم 10% والباقي قسط على 50 شهر", images: [] },
                    { floor: "الدور الثاني", size: "130 متر", view: "خلفي مميز", rooms: "3 غرف + 2 حمام + ريسبشن قطعتين", price: "2,150,000 ج.م", payment: "كاش بخصم أو قسط على 50 شهر", images: [] },
                    { floor: "الدور الثالث", size: "150 متر", view: "واجهة أمامية", rooms: "3 غرف + 2 حمام + ريسبشن 3 قطع", price: "2,600,000 ج.م", payment: "تسهيلات في السداد", images: [] }
                ]
            }
        ];

        function renderMarkers() {
            map.eachLayer(function (layer) { if (layer instanceof L.Marker && layer !== tempMarker) map.removeLayer(layer); });
            allBuildings.forEach((b) => {
                const marker = L.marker(b.coords).addTo(map);
                marker.bindTooltip(b.name, { permanent: true, direction: 'top' });
                marker.on('click', function() { if(!adminMode) openBuildingModal(b); else openAdminDelete(b); });
            });
        }

        // فتح نافذة العمارة الكبيرة (الخطوة 1)
        function openBuildingModal(b) {
            currentSelectedBuilding = b;
            document.getElementById('modal-b-name').innerText = b.name;
            document.getElementById('modal-b-loc').innerText = "📍 " + b.locationDesc;
            
            // الصور الرئيسية
            const imgContainer = document.getElementById('modal-building-img-container');
            if(b.images && b.images.length > 0) {
                imgContainer.innerHTML = `<img src="${b.images[0]}" class="main-view-img"/>`;
            } else {
                imgContainer.innerHTML = `<div class="main-view-img" style="background:#cbd5e1; display:flex; align-items:center; justify-content:center; color:#64748b;">📸 لا توجد صور واجهة مرفوعة حالياً</div>`;
            }

            // التاجات
            const tagsDiv = document.getElementById('modal-b-tags');
            tagsDiv.innerHTML = '';
            b.types.forEach(t => tagsDiv.innerHTML += `<span class="tag">${t}</span>`);

            // تجميع الأدوار بدون تكرار
            const floorsList = document.getElementById('modal-floors-list');
            floorsList.innerHTML = '';
            const uniqueFloors = [...new Set(b.apartments.map(a => a.floor))];
            
            uniqueFloors.forEach(floorName => {
                floorsList.innerHTML += `<button class="floor-btn" onclick="selectFloor('${floorName}')">🏢 ${floorName}</button>`;
            });

            // إرجاع الأنيميشن للوضع الأول (الأدوار ظاهر والمساحات مخفي)
            document.getElementById('floors-section').classList.remove('fade-out');
            document.getElementById('sizes-section').classList.add('fade-out');

            document.getElementById('building-modal').classList.add('active');
        }

        // اختيار الدور والانتقال بنعومة للمساحات (الخطوة 2)
        function selectFloor(floorName) {
            document.getElementById('selected-floor-title').innerText = `المساحات المتاحة في (${floorName}):`;
            const sizesList = document.getElementById('modal-sizes-list');
            sizesList.innerHTML = '';

            // تصفية الشقق اللي في الدور ده بس
            const filteredApts = currentSelectedBuilding.apartments.filter(a => a.floor === floorName);
            
            filteredApts.forEach(apt => {
                sizesList.innerHTML += `
                    <div class="size-card" onclick="openApartmentModal(${JSON.stringify(apt).replace(/"/g, '&quot;')})">
                        <div>
                            <strong style="font-size:18px; color:#1e3a8a;">📐 مساحة ${apt.size}</strong>
                            <p style="font-size:13px; color:#64748b; margin-top:4px;">👁️ الإطلالة: ${apt.view}</p>
                        </div>
                        <span class="price-badge">${apt.price}</span>
                    </div>
                `;
            });

            // عمل أنيميشن الاختفاء والظهور
            document.getElementById('floors-section').classList.add('fade-out');
            const sizesSection = document.getElementById('sizes-section');
            sizesSection.classList.remove('fade-out');
            sizesSection.classList.add('fade-in');
        }

        function goBackToFloors() {
            document.getElementById('sizes-section').classList.add('fade-out');
            const floorsSection = document.getElementById('floors-section');
            floorsSection.classList.remove('fade-out');
            floorsSection.classList.add('fade-in');
        }

        // فتح نافذة الشقة الكبيرة المنفصلة (الخطوة 3)
        function openApartmentModal(apt) {
            document.getElementById('apt-modal-title').innerText = `🏢 تفاصيل شقة مساحة ${apt.size}`;
            document.getElementById('apt-modal-view').innerText = apt.view;
            document.getElementById('apt-modal-rooms').innerText = apt.rooms;
            document.getElementById('apt-modal-price').innerText = `💰 السعر الإجمالي: ${apt.price}`;
            document.getElementById('apt-modal-payment').innerText = `💳 نظام السداد: ${apt.payment}`;

            const gallery = document.getElementById('apt-modal-gallery');
            gallery.innerHTML = '';
            if(apt.images && apt.images.length > 0) {
                apt.images.forEach(img => {
                    gallery.innerHTML += `<img src="${img}" onclick="window.open('${img}')"/>`;
                });
            } else {
                gallery.innerHTML = '<p style="color:#94a3b8; font-size:13px; padding:10px 0;">📸 لم يتم رفع صور داخلية للشقة بعد.</p>';
            }

            document.getElementById('apartment-modal').classList.add('active');
        }

        function closeBuildingModal() { document.getElementById('building-modal').classList.remove('active'); }
        function closeApartmentModal() { document.getElementById('apartment-modal').classList.remove('active'); }
        function closeModal(modal, e) { if(e.target === modal) modal.classList.remove('active'); }

        // وضع الأدمن (إضافة العماير) - كما هو للحفاظ على البيانات القديمة
        function toggleAdminMode() {
            adminMode = !adminMode;
            const btn = document.getElementById('admin-toggle-btn');
            if(adminMode) {
                btn.innerText = "🛑 إلغاء وضع التعديل";
                btn.classList.add('btn-admin-active');
                document.getElementById('admin-sidebar').style.display = 'block';
            } else {
                btn.innerText = "🔧 وضع إضافة العماير";
                btn.classList.remove('btn-admin-active');
                closeAdminSidebar();
            }
        }

        map.on('click', function(e) {
            if (!adminMode) return;
            if (tempMarker) map.removeLayer(tempMarker);
            currentTempCoords = [e.latlng.lat, e.latlng.lng];
            tempMarker = L.marker(currentTempCoords).addTo(map);
            document.getElementById('form-floors-container').innerHTML = '';
        });

        let floorCount = 0;
        function addFloorForm() {
            floorCount++;
            const container = document.getElementById('form-floors-container');
            const floorId = `floor-${floorCount}`;
            const html = `
                <div class="nested-box" id="${floorId}">
                    <label>الدور:</label><input type="text" class="floor-name-input" placeholder="الدور الثاني">
                    <div class="apts-box"></div>
                    <button class="btn" style="font-size:12px; margin-top:5px; background:#0284c7;" onclick="addAptForm('${floorId}')">➕ شقة في هذا الدور</button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            addAptForm(floorId);
        }

        let aptCount = 0;
        function addAptForm(floorId) {
            aptCount++;
            const box = document.getElementById(floorId).querySelector('.apts-box');
            const aptUid = `uid-${aptCount}`;
            const html = `
                <div class="apt-edit-box" id="${aptUid}" style="border:1px solid #cbd5e1; padding:8px; margin:5px 0;">
                    <input type="text" class="apt-size" placeholder="المساحة: 125 متر">
                    <input type="text" class="apt-price" placeholder="السعر: 2,000,000 ج.م" style="margin-top:4px;">
                    <input type="text" class="apt-view" placeholder="الإطلالة: خلفي" style="margin-top:4px;">
                    <input type="text" class="apt-rooms" placeholder="التقسيم: 3 غرف" style="margin-top:4px;">
                    <input type="text" class="apt-payment" placeholder="السداد: قسط" style="margin-top:4px;">
                    <input type="file" multiple accept="image/*" onchange="saveAptImages(this, '${aptUid}')" style="margin-top:4px;">
                </div>`;
            box.insertAdjacentHTML('beforeend', html);
        }

        function handleBuildingImages(input) {
            uploadedBuildingImages = [];
            if(input.files) {
                Array.from(input.files).forEach(f => {
                    const r = new FileReader();
                    r.onload = (e) => uploadedBuildingImages.push(e.target.result);
                    r.readAsDataURL(f);
                });
            }
        }

        function saveAptImages(input, uid) {
            uploadedAptImagesMap[uid] = [];
            if(input.files) {
                Array.from(input.files).forEach(f => {
                    const r = new FileReader();
                    r.onload = (e) => uploadedAptImagesMap[uid].push(e.target.result);
                    r.readAsDataURL(f);
                });
            }
        }

        function saveNewBuilding() {
            const name = document.getElementById('form-b-name').value;
            const desc = document.getElementById('form-b-desc').value;
            if(!name) return alert("اكتب الاسم");

            const apartments = [];
            document.querySelectorAll('.nested-box').forEach(fb => {
                const fName = fb.querySelector('.floor-name-input').value || "غير محدد";
                fb.querySelectorAll('.apt-edit-box').forEach(ab => {
                    apartments.push({
                        floor: fName,
                        size: ab.querySelector('.apt-size').value || "غير محدد",
                        price: ab.querySelector('.apt-price').value || "غير محدد",
                        view: ab.querySelector('.apt-view').value || "غير محدد",
                        rooms: ab.querySelector('.apt-rooms').value || "غير محدد",
                        payment: ab.querySelector('.apt-payment').value || "غير محدد",
                        images: uploadedAptImagesMap[ab.id] || []
                    });
                });
            });

            allBuildings.push({ id: Date.now(), name, coords: currentTempCoords, locationDesc: desc, types: ["سكني"], images: uploadedBuildingImages, apartments });
            if(tempMarker) map.removeLayer(tempMarker);
            tempMarker = null;
            toggleAdminMode();
            renderMarkers();
        }

        function openAdminDelete(b) {
            if(confirm(`حذف ${b.name}؟`)) {
                allBuildings = allBuildings.filter(x => x.id !== b.id);
                renderMarkers();
            }
        }

        function closeAdminSidebar() { document.getElementById('admin-sidebar').style.display = 'none'; if(tempMarker) map.removeLayer(tempMarker); }

        renderMarkers();
    </script>
</body>
</html>
