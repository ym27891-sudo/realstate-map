<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Inventory عقاري اليوم</title>
    <link class="program-favicon" rel="icon" type="image/png" href="https://img.icons8.com/fluency/512/home.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/home.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main-blue: #1e3a8a; }
        .edit-animate { transition: all 0.2s ease; cursor: pointer; }
        .edit-animate:hover { background-color: #f8fafc; transform: scale(1.01); }
        .tab-btn { white-space: nowrap; transition: all 0.3s; cursor: pointer; user-select: none; border: 1px solid #e2e8f0; padding: 8px 20px; border-radius: 9999px; background: white; color: #64748b; font-weight: 900; }
        .tab-btn.active { background-color: var(--main-blue) !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .tab-dragging { opacity: 0.5; background: #cbd5e1 !important; border: 2px dashed var(--main-blue) !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .bg-navy { background-color: #1e3a8a; }
        .text-navy { color: #1e3a8a; }
        
        .eng-num {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
            font-weight: 800 !important;
            direction: ltr !important;
            text-align: center !important;
        }

        .modal-animate {
            animation: fadeInZoom 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeInZoom {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media print {
            body * { visibility: hidden; }
            #adminReportModal, #adminReportModal * { visibility: visible; }
            #adminReportModal { position: absolute; left: 0; top: 0; width: 100%; max-height: none !important; overflow: visible !important; box-shadow: none !important; }
            .no-print { display: none !important; }
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, getDoc, setDoc, query, orderBy, limit, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCN5AKTo3Ojfh3Dx78sSa3nglhNXDpCx_8",
            authDomain: "hadayek-realestate.firebaseapp.com",
            projectId: "hadayek-realestate",
            storageBucket: "hadayek-realestate.firebasestorage.app",
            messagingSenderId: "889853758510",
            appId: "1:889853758510:web:8144e5362f788363a0e3bf",
            databaseURL: "https://hadayek-realestate-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);

        let currentUserRole = 'sales', dataStore = [], resaleStore = [], teamsStore = [], activeTab = 'الكل';
        let showCommercialOnly = false, showOnlyAvailable = false, buildingOrder = [], onlineUsers = {}, unreadCount = 0, firstLoad = true;
        let searchMode = 'size'; 
        let selectedMonthsForReport = []; 
        let selectedArchiveYear = "current"; 
        let currentActiveReportTeamId = ""; 
        let loggedInUserDocId = "";
        let currentEditingPropId = "";
        
        // بيانات السيلز اللي هتتربط في اللينك
        let currentAgentPhone = "01000000000";
        let currentAgentWhatsapp = "201000000000";

        const notifSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        function cleanToEngNum(str) {
            if(!str) return '';
            return str.toString().replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632)
                                     .replace(/[۰-۹]/g, d => d.charCodeAt(0) - 1776)
                                     .replace(/[^0-9.]/g, '');
        }

        function formatMoney(num) {
            if(!num && num !== 0) return '';
            return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function unformatMoney(str) {
            if(!str) return 0;
            return parseFloat(str.toString().replace(/,/g, '')) || 0;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loggedInUserDocId = user.uid;
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                currentUserRole = (user.email.toLowerCase() === "ym27891@gmail.com") ? 'admin' : (userDoc.exists() ? userDoc.data().role : 'sales');
                if(!userDoc.exists()) await setDoc(doc(db, 'users', user.uid), { email: user.email, role: 'sales', name: '', teamId: '', phone: '', whatsapp: '' });
                
                if(userDoc.exists() && userDoc.data().name) {
                    window.currentAgentName = userDoc.data().name;
                    currentAgentPhone = userDoc.data().phone || "01000000000";
                    currentAgentWhatsapp = userDoc.data().whatsapp || "201000000000";
                } else {
                    window.currentAgentName = "";
                    document.getElementById('nameSetupModal').style.display = 'flex';
                }

                set(ref(rtdb, 'status/' + user.uid), { email: user.email, online: true });
                onDisconnect(ref(rtdb, 'status/' + user.uid)).remove();
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                document.getElementById('adminArea').classList.toggle('hidden', currentUserRole !== 'admin');
                if(document.getElementById('adminResaleAdd')) {
                    document.getElementById('adminResaleAdd').classList.toggle('hidden', currentUserRole !== 'admin');
                }
                document.getElementById('usersControl').classList.toggle('hidden', currentUserRole !== 'admin');
                document.getElementById('adminReportBtn').classList.toggle('hidden', currentUserRole !== 'admin');
                initAppListeners();
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
        });

        function initAppListeners() {
            onSnapshot(doc(db, 'settings', 'buildingOrder'), (snap) => { if(snap.exists()) buildingOrder = snap.data().order || []; renderTabs(); });
            onSnapshot(collection(db, 'properties'), (snap) => { 
                dataStore = snap.docs.map(d => ({id: d.id, ...d.data()})); 
                renderTable(); 
                if(currentUserRole === 'admin' && document.getElementById('monthsCheckboxesContainer')) {
                    window.populateMonthFilters();
                    window.updateReportData();
                }
            });
            onSnapshot(collection(db, 'resale'), (snap) => { resaleStore = snap.docs.map(d => ({id: d.id, ...d.data()})); renderResale(); });
            onSnapshot(collection(db, 'teams'), (snap) => {
                teamsStore = snap.docs.map(d => ({id: d.id, ...d.data()}));
            });
            onSnapshot(collection(db, 'users'), (snap) => { window.allUsersData = snap.docs.map(d => ({id: d.id, ...d.data()})); });
        }

        let submitAction = 'login';
        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById('loginBtn');
            const regBtn = document.getElementById('regBtn');
            if(loginBtn) loginBtn.addEventListener('click', () => { submitAction = 'login'; });
            if(regBtn) regBtn.addEventListener('click', () => { submitAction = 'register'; });
        });

        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) { alert("برجاء ملء البيانات أولاً"); return; }
            try {
                if (submitAction === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("تم إنشاء الحساب وتسجيل الدخول بنجاح!");
                }
            } catch (error) {
                alert("حدث خطأ أثناء العملية: " + error.message);
            }
        };

        const commKeywords = ['محل', 'مكتب', 'تجارى', 'ادارى', 'إداري', 'صيدلية', 'عيادة', 'بدروم'];

        window.renderTable = () => {
            const tbody = document.getElementById('propertiesList'); 
            if(!tbody) return;
            let htmlBuffer = '';
            const term = document.getElementById('searchBox').value.trim().toLowerCase();

            let filtered = dataStore.filter(p => {
                const matchAvailable = showOnlyAvailable ? p.status === 'متاح' : true;
                if (!matchAvailable) return false;
                const isComm = commKeywords.some(k => p.floor?.toLowerCase().includes(k));
                if (activeTab === 'التجاري العام 🏢' && !isComm) return false;
                if (activeTab !== 'الكل' && activeTab !== 'التجاري العام 🏢' && p.area !== activeTab) return false;
                if (!term) return true;
                return (p.area?.toLowerCase().includes(term) || p.code?.toLowerCase().includes(term));
            });

            filtered.sort((a, b) => (parseInt(a.floor) || 0) - (parseInt(b.floor) || 0));
            
            filtered.forEach(item => {
                const isComm = commKeywords.some(k => item.floor?.toLowerCase().includes(k));
                const icon = isComm ? '🏢' : '🏠';
                let displayStatus = item.status || 'متاح';
                let statusCls = displayStatus === 'متاح' ? "bg-green-600 text-white" : displayStatus === 'تم الحجز' ? "bg-yellow-400 text-black shadow-sm" : "bg-red-600 text-white";
                
                // لاحظ هنا بنبعت area كمان جوا الـ openCalc عشان الماب تعرف تطير لانهي عمارة
                htmlBuffer += `<tr class="border-b text-center text-sm bg-white hover:bg-blue-50 transition font-black">
                    <td class="p-4">${icon}</td>
                    <td class="p-4 text-navy text-right font-black italic">${item.code}</td>
                    <td class="p-4">${item.area}</td>
                    <td class="p-4 text-[10px] text-slate-400 italic">${item.finish || 'طوب أحمر'}</td>
                    <td class="p-4 text-slate-600 font-black">${item.size}م / د ${item.floor || '-'}</td>
                    <td class="p-4 text-green-700 font-bold text-[10px]">${Number(item.unitPrice || 0).toLocaleString('en-US')}ج</td>
                    <td onclick="window.openCalc(${item.price}, '${item.code}', '${item.area}')" class="p-4 font-black text-blue-800 cursor-pointer underline italic">${Number(item.price).toLocaleString('en-US')}ج</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-[10px] ${statusCls}">${displayStatus}</span></td>
                    <td class="p-4 flex items-center justify-center gap-2">
                        <button onclick="window.openCalc(${item.price}, '${item.code}', '${item.area}')" class="bg-navy text-white px-2 py-1 rounded text-[10px] shadow-md uppercase italic font-black">احسب</button>
                    </td></tr>`;
            });
            tbody.innerHTML = htmlBuffer;
            renderTabs();
        };

        // دالة حفظ بيانات السيلز للهوية
        window.saveAgentNameSetup = async () => {
            const name = document.getElementById('setupAgentNameInput').value.trim();
            const phone = document.getElementById('setupAgentPhoneInput').value.trim();
            const ws = document.getElementById('setupAgentWsInput').value.trim();
            if(!name || !phone || !ws) { alert("أدخل بياناتك كاملة أولاً يا فنان عشان السيستم يربط عمولاتك صح!"); return; }
            await updateDoc(doc(db, 'users', loggedInUserDocId), { name: name, phone: phone, whatsapp: ws });
            window.currentAgentName = name; currentAgentPhone = phone; currentAgentWhatsapp = ws;
            document.getElementById('nameSetupModal').style.display = 'none';
        };

        window.runCalc = (trigger) => {
            const totalInput = document.getElementById('m_total');
            const downInput = document.getElementById('m_down');
            const downPctInput = document.getElementById('m_down_pct');
            const dAmountInput = document.getElementById('m_d_amount');
            const dPctInput = document.getElementById('m_d_pct');
            const monthsInput = document.getElementById('m_months');
            const monthlyInput = document.getElementById('res_monthly_input');

            let total = unformatMoney(cleanToEngNum(totalInput.value));
            let down = unformatMoney(cleanToEngNum(downInput.value));
            let downPct = parseFloat(cleanToEngNum(downPctInput.value)) || 0;
            let dAmount = unformatMoney(cleanToEngNum(dAmountInput.value));
            let dPct = parseFloat(cleanToEngNum(dPctInput.value)) || 0;
            let months = parseInt(cleanToEngNum(monthsInput.value)) || 0;
            let monthly = unformatMoney(cleanToEngNum(monthlyInput.value));

            if (trigger === 'price') {
                if (downPct > 0) down = total * (downPct / 100);
                if (dPct > 0) dAmount = total * (dPct / 100);
            } else if (trigger === 'pct_input') {
                down = total * (downPct / 100);
            } else if (trigger === 'amount_input') {
                downPct = total > 0 ? (down / total) * 100 : 0;
            } else if (trigger === 'd_pct') {
                dAmount = total * (dPct / 100);
            } else if (trigger === 'd_amount') {
                dPct = total > 0 ? (dAmount / total) * 100 : 0;
            }

            let rem = total - down - dAmount;
            if (rem < 0) rem = 0;

            if (trigger === 'output_edit') {
                if (monthly > 0 && rem > 0) {
                    months = Math.ceil(rem / monthly);
                    monthsInput.value = months;
                }
            } else {
                if (months > 0) {
                    monthly = rem / months;
                } else {
                    monthly = 0;
                }
            }

            if (trigger !== 'amount_input') downInput.value = down > 0 ? formatMoney(down) : '';
            if (trigger !== 'pct_input') downPctInput.value = downPct > 0 ? downPct.toFixed(1).replace('.0', '') : '';
            if (trigger !== 'd_amount') dAmountInput.value = dAmount > 0 ? formatMoney(dAmount) : '';
            if (trigger !== 'd_pct') dPctInput.value = dPct > 0 ? dPct.toFixed(1).replace('.0', '') : '';
            if (trigger !== 'output_edit') monthlyInput.value = monthly > 0 ? formatMoney(monthly) : '';
        };

        window.renderTabs = () => { const container = document.getElementById('buildingTabs'); if(!container) return; const allB = [...new Set(dataStore.map(i => i.area))]; let sorted = buildingOrder.filter(b => b.includes(b)); allB.forEach(b => { if(!sorted.includes(b)) sorted.push(b); }); let html = `<button onclick="setTab('الكل')" class="tab-btn ${activeTab === 'الكل' ? 'active' : ''}">الكل</button>`; html += sorted.map((b, idx) => `<button onclick="setTab('${b}')" class="tab-btn ${activeTab === b ? 'active' : ''}">${b}</button>`).join(''); html += `<button onclick="setTab('التجاري العام 🏢')" class="tab-btn ${activeTab === 'التجاري العام 🏢' ? 'active' : ''}" style="${activeTab === 'التجاري العام 🏢' ? '' : 'background:#334155;color:white;'}">التجاري العام 🏢</button>`; container.innerHTML = html; };
        
        window.openCalc = (p, c, area) => { 
            document.getElementById('calcModal').style.display='flex'; 
            document.getElementById('m_code').innerText=c; 
            document.getElementById('m_area').innerText=area; 
            document.getElementById('m_total').value = formatMoney(p); 
            document.getElementById('m_down').value='';
            document.getElementById('m_down_pct').value='';
            document.getElementById('m_d_amount').value='';
            document.getElementById('m_d_pct').value='';
            document.getElementById('m_months').value='';
            document.getElementById('res_monthly_input').value='';
            window.runCalc('price'); 
        };

        // الدالة السحرية لإرسال اللينك للماب
        window.generateAndSendToMap = () => {
            const code = document.getElementById('m_code').innerText;
            const area = document.getElementById('m_area').innerText;
            const total = unformatMoney(cleanToEngNum(document.getElementById('m_total').value));
            const down = unformatMoney(cleanToEngNum(document.getElementById('m_down').value));
            const months = document.getElementById('m_months').value || "0";
            const monthly = unformatMoney(cleanToEngNum(document.getElementById('res_monthly_input').value));

            // الرابط الذكي للخرائط
            const mapPageUrl = "map.html"; // تأكد من إن اسم ملف الخرائط كدا
            const finalLink = `${window.location.origin}/${mapPageUrl}?code=${encodeURIComponent(code)}&area=${encodeURIComponent(area)}&total=${total}&down=${down}&months=${months}&monthly=${monthly}&sales_name=${encodeURIComponent(window.currentAgentName)}&sales_phone=${currentAgentPhone}&sales_ws=${currentAgentWhatsapp}`;
            
            navigator.clipboard.writeText(finalLink);
            alert("عاش يا بطل! 🚀\nتم توليد اللينك الذكي المخصص للشقة بالحسبة دي ونسخه في جهازك بنجاح.\nابعته للعميل فوراً على الواتساب!");
            document.getElementById('calcModal').style.display='none';
        };

        window.setTab = (t) => { activeTab = t; showCommercialOnly = false; renderTable(); };
        window.logout = () => signOut(auth).then(() => { location.reload(); });
    </script>
</head>
<body class="bg-white text-right font-sans">
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4 font-black">
        <form onsubmit="handleAuth(event)" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-navy">
            <h2 class="text-4xl font-black text-navy mb-6 font-serif uppercase tracking-tighter italic">Inventory</h2>
            <input id="email" type="email" placeholder="الإيميل" class="w-full border p-3 rounded-xl mb-3 outline-none text-center bg-slate-50 italic uppercase font-black" required>
            <input id="pass" type="password" placeholder="الباسورد" class="w-full border p-3 rounded-xl mb-5 outline-none text-center bg-slate-50 italic uppercase font-black" required>
            <div class="flex gap-2 font-black italic">
                <button type="submit" id="loginBtn" class="flex-1 bg-navy text-white p-3 rounded-xl font-black shadow-lg hover:bg-slate-800 transition uppercase italic">دخول</button>
            </div>
        </form>
    </div>

    <div id="appSection" class="hidden max-w-6xl mx-auto p-4 md:p-8 font-black uppercase">
        <header class="flex justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border-r-8 border-navy relative font-black">
            <h1 class="text-3xl font-black text-navy italic font-serif tracking-tighter uppercase">Inventory</h1>
            <div class="flex items-center gap-4 font-black">
                <button onclick="logout()" class="text-xs text-red-500 font-black bg-red-50 px-4 py-2 rounded-xl border border-red-100 uppercase italic">خروج</button>
            </div>
        </header>

        <div id="buildingTabs" class="flex gap-2 flex-wrap pb-4 mb-4 border-b border-slate-100 font-black italic uppercase"></div>

        <div class="bg-navy p-4 rounded-2xl mb-4 shadow-xl flex gap-2 items-center italic uppercase font-black">
            <input id="searchBox" type="text" oninput="renderTable()" placeholder="🔍 ابحث في الكود أو العمارة..." class="flex-1 p-3 rounded-xl outline-none font-bold text-xs text-center shadow-inner bg-white/90">
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-x-auto border border-slate-200 font-black italic uppercase font-black">
            <table class="w-full text-right min-w-[1000px] font-black italic uppercase text-right">
                <thead class="bg-slate-800 text-white text-[11px] uppercase font-black text-center italic">
                    <tr> <th class="p-5 font-black uppercase tracking-tighter">#</th> <th class="p-5 font-black uppercase tracking-tighter text-right">كود</th> <th class="p-5 font-black uppercase tracking-tighter text-center">العمارة</th> <th class="p-5 font-black uppercase tracking-tighter text-center">التشطيب</th> <th class="p-5 font-black uppercase tracking-tighter text-center">مساحة/دور</th> <th class="p-5 font-black uppercase tracking-tighter text-center italic">سعر المتر</th> <th class="p-5 font-black uppercase tracking-tighter text-right italic font-black">السعر</th> <th class="p-5 font-black uppercase tracking-tighter text-center">الحالة</th> <th class="p-5 font-black uppercase tracking-tighter text-center">تحكم</th> </tr>
                </thead>
                <tbody id="propertiesList" class="font-black italic uppercase font-black"></tbody>
            </table>
        </div>
    </div>
    
    <div id="nameSetupModal" style="display:none;" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm items-center justify-center p-4 z-[10005]">
        <div class="bg-white p-6 rounded-[2rem] shadow-2xl w-full max-w-xs border-t-8 border-navy modal-animate text-center font-black">
            <h3 class="text-navy font-black text-base mb-2">إعداد هويتك التسويقية فريد 👋</h3>
            <p class="text-[11px] text-slate-400 mb-4 font-medium">عشان السيستم يولد اللينك بتاعك صح، أضف بياناتك.</p>
            <input id="setupAgentNameInput" type="text" placeholder="اسمك الثنائي (مثال: محمد سعيد)" class="w-full border p-3 rounded-xl text-center text-xs outline-none bg-slate-50 focus:border-navy font-black mb-3">
            <input id="setupAgentPhoneInput" type="text" placeholder="رقم الاتصال المباشر (مثال: 01012345678)" class="w-full border p-3 rounded-xl text-center text-xs outline-none bg-slate-50 focus:border-navy font-black mb-3">
            <input id="setupAgentWsInput" type="text" placeholder="رقم الواتساب للعميل (مثال: 201012345678)" class="w-full border p-3 rounded-xl text-center text-xs outline-none bg-slate-50 focus:border-navy font-black mb-4">
            <input type="button" onclick="window.saveAgentNameSetup()" value="حفظ وتفعيل السيستم" class="w-full bg-navy text-white p-3 rounded-xl font-black shadow-md text-xs hover:bg-slate-800 transition cursor-pointer">
        </div>
    </div>

    <div id="calcModal" style="display:none;" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10001] font-black uppercase italic">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-[340px] relative border-t-8 border-navy p-6 text-right font-black">
            <button onclick="document.getElementById('calcModal').style.display='none'" class="absolute top-2 right-4 text-slate-300 text-xl font-bold transition hover:text-red-500 font-black">×</button>
            <h3 class="text-navy font-black mb-4 text-lg text-right italic underline underline-offset-4 font-black">حساب القسط: <span id="m_code"></span> (<span id="m_area"></span>)</h3>
            <div class="space-y-4 font-black italic text-right">
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1 pr-2 uppercase font-black">إجمالي السعر</label>
                    <input id="m_total" type="text" oninput="window.runCalc('price')" class="w-full bg-slate-50 border p-2 rounded-lg eng-num font-extrabold text-base outline-none border-slate-200">
                </div>
                <div class="border-b pb-2">
                    <label class="text-[10px] text-navy block mb-1 pr-2 font-black">المقدم</label>
                    <div class="grid grid-cols-3 gap-2 w-full">
                        <input id="m_down_pct" placeholder="%" type="text" oninput="window.runCalc('pct_input')" class="col-span-1 bg-slate-50 border p-2 rounded-xl eng-num font-extrabold text-base border-slate-200">
                        <input id="m_down" placeholder="كاش" type="text" oninput="window.runCalc('amount_input')" class="col-span-2 bg-slate-50 border p-2 rounded-xl eng-num font-extrabold text-base border-slate-200">
                    </div>
                </div>
                <div class="border-b pb-2">
                    <label class="text-[10px] text-red-500 block mb-1 pr-2 font-black">الدفعات %</label>
                    <div class="grid grid-cols-3 gap-2 w-full">
                        <input id="m_d_pct" placeholder="%" type="text" oninput="window.runCalc('d_pct')" class="col-span-1 bg-slate-50 border p-2 rounded-xl eng-num font-extrabold text-base border-red-100">
                        <input id="m_d_amount" placeholder="كاش" type="text" oninput="window.runCalc('d_amount')" class="col-span-2 bg-slate-50 border p-2 rounded-xl eng-num font-extrabold text-base border-red-100">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 block mb-1 pr-2 font-black uppercase">عدد الشهور الكلي</label>
                    <input id="m_months" type="text" oninput="window.runCalc('price')" class="w-full bg-gray-50 border p-2 rounded-xl eng-num font-extrabold text-base border-slate-200">
                </div>
            </div>
            <div class="mt-6 bg-slate-50 border border-slate-200 p-4 rounded-3xl text-center font-black relative">
                <label class="text-[10px] text-slate-400 block mb-1 font-black">القسط الشهري:</label>
                <div class="flex items-center justify-center gap-1 border-b border-slate-300 focus-within:border-navy py-1 mx-4">
                    <span class="text-xs font-bold text-slate-400 font-mono">EGP</span>
                    <input id="res_monthly_input" type="text" oninput="window.runCalc('output_edit')" class="bg-transparent text-blue-900 eng-num font-extrabold text-2xl w-full text-center outline-none" placeholder="0">
                </div>
            </div>
            
            <button onclick="window.generateAndSendToMap()" class="w-full bg-green-600 hover:bg-green-700 text-white p-4 mt-4 rounded-2xl font-black shadow-lg text-xs transition">🔗 إرسال العرض للعميل عبر الخريطة</button>
            <button onclick="document.getElementById('calcModal').style.display='none'" class="w-full bg-slate-100 text-slate-500 p-3 mt-2 rounded-2xl font-black text-xs transition">إغلاق</button>
        </div>
    </div>
</body>
</html>
